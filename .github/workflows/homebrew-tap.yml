name: Update Homebrew Tap

# Release 发布后自动更新 Homebrew tap 仓库
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tap:
    name: Update Homebrew formula
    runs-on: macos-latest
    steps:
      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const version = release.data.tag_name.replace('v', '');
            const arm64 = release.data.assets.find(a => a.name.includes('aarch64') && a.name.includes('macos'));
            const x86_64 = release.data.assets.find(a => a.name.includes('x86_64') && a.name.includes('macos'));
            core.setOutput('version', version);
            core.setOutput('arm64_url', arm64?.browser_download_url || '');
            core.setOutput('x86_64_url', x86_64?.browser_download_url || '');
            core.setOutput('arm64_sha256', '');
            core.setOutput('x86_64_sha256', '');

      - name: Download and compute SHA256
        run: |
          if [ -n "${{ steps.release.outputs.arm64_url }}" ]; then
            curl -sL "${{ steps.release.outputs.arm64_url }}" -o arm64.tar.gz
            echo "ARM64_SHA256=$(shasum -a 256 arm64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          fi
          if [ -n "${{ steps.release.outputs.x86_64_url }}" ]; then
            curl -sL "${{ steps.release.outputs.x86_64_url }}" -o x86_64.tar.gz
            echo "X86_64_SHA256=$(shasum -a 256 x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          fi

      - name: Update Homebrew tap
        uses: dawidd6/action-homebrew-tap@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          tap: iQNRen/homebrew-tap
          formula: rusterm.rb
          url-arm64: ${{ steps.release.outputs.arm64_url }}
          sha256-arm64: ${{ env.ARM64_SHA256 }}
          url-x86_64: ${{ steps.release.outputs.x86_64_url }}
          sha256-x86_64: ${{ env.X86_64_SHA256 }}
